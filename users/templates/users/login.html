{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login </title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{% static 'css/main.css' %}"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon"></div>
      
      <p><h1>College Management System</h1></p>
    </div>
    <div class="login-body">
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags|default:'error' }}" style="margin-bottom:16px;"> {{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required/>
        </div>
        <div style="margin-top:24px;">
          <button type="submit" class="btn btn-primary"> &nbsp;Sign In</button>
        </div>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:12px;color:#94a3b8;">
       w
      </p>
    </div>
  </div>
</div>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
